spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/vapt_tracker?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:admin}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
server.port=${PORT:8080}
jwt.secret=THIS_IS_MY_SUPER_SECRET_JWT_KEY_123456789_SECURE
jwt.expiration=86400000
file.upload-dir=uploads/reports/
